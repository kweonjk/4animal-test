<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG 이미지 생성기 — 4동물 유형검사</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  body { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: #F4F7FB; margin: 0; padding: 40px 20px; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { color: #1F3864; margin-bottom: 8px; }
  .intro { color: #555; line-height: 1.6; margin-bottom: 24px; background: white; padding: 18px 22px; border-radius: 12px; border-left: 4px solid #1F3864; }
  .actions { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .btn { padding: 14px 24px; border: none; border-radius: 10px; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #1F3864; color: white; }
  .btn-primary:hover { background: #2E75B6; }
  .btn-primary:disabled { background: #B0B8C8; cursor: not-allowed; }
  .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .preview-item { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .preview-header { padding: 12px 16px; background: #F0F4FB; border-bottom: 1px solid #E0E7F0; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .preview-name { font-weight: 700; color: #1F3864; font-size: 0.95rem; }
  .btn-download-one { padding: 8px 14px; background: #2E8B2E; color: white; border: none; border-radius: 8px; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
  .btn-download-one:hover { background: #1A5C1A; }
  .preview-canvas-wrap { position: relative; aspect-ratio: 1200 / 630; overflow: hidden; }
  .og-card { position: absolute; top: 0; left: 0; width: 1200px; height: 630px; transform-origin: top left; transform: scale(0.35); font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; padding: 60px 80px; text-align: center; }
  .og-card.hub { background: linear-gradient(135deg, #0F0C29 0%, #302B63 50%, #24243E 100%); }
  .og-card.general { background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%); }
  .og-card.work { background: linear-gradient(135deg, #006064 0%, #00ACC1 100%); }
  .og-card.love { background: linear-gradient(135deg, #9C2D22 0%, #C0392B 100%); }
  .og-card.family { background: linear-gradient(135deg, #1A5C1A 0%, #2E8B2E 100%); }
  .og-card.friend { background: linear-gradient(135deg, #A04A0A 0%, #E07B20 100%); }
  .og-animals { font-size: 140px; line-height: 1; letter-spacing: 24px; margin-bottom: 36px; }
  .og-title { font-size: 88px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 24px; line-height: 1.1; }
  .og-subtitle { font-size: 46px; font-weight: 600; opacity: 0.95; margin-bottom: 40px; line-height: 1.3; }
  .og-footer { font-size: 28px; opacity: 0.8; font-weight: 600; }
  .og-footer .dot { margin: 0 12px; opacity: 0.5; }
  .render-area { position: fixed; top: 0; left: -9999px; }
  .status { margin-top: 20px; padding: 14px 18px; border-radius: 10px; font-size: 0.95rem; min-height: 24px; }
  .status.info { background: #E8F0FF; color: #1F3864; border: 1.5px solid #BED4F0; }
  .status.success { background: #E8F5E9; color: #1A5C1A; border: 1.5px solid #A9DFBF; }
  .status.error { background: #FFF0F0; color: #C00000; border: 1.5px solid #FFD0D0; }
  .progress { display: none; margin-top: 8px; }
  .progress.show { display: block; }
  .progress-bar { height: 6px; background: #E0E7F0; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #1F3864, #2E75B6); transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 0.85rem; color: #666; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>🖼️ OG 이미지 생성기</h1>
  <div class="intro">
    카톡·페이스북·트위터 등에서 링크 공유 시 보이는 미리보기 이미지 6장을 한 번에 생성합니다.<br>
    "모두 다운로드" 클릭 → 6장 PNG 다운로드 → GitHub 저장소 루트에 업로드.
  </div>
  <div class="actions">
    <button class="btn btn-primary" id="btn-download-all" onclick="downloadAll()">📥 6장 모두 다운로드</button>
    <button class="btn btn-primary" onclick="location.href='admin/index.html'" style="background:#2E8B2E">← 관리자 페이지로</button>
  </div>
  <div class="status info" id="status">💡 미리보기는 작게 보이지만, 실제 다운로드되는 이미지는 1200×630 고해상도입니다.</div>
  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">대기 중...</div>
  </div>
  <div class="preview-grid" id="preview-grid"></div>
</div>

<div class="render-area" id="render-area"></div>

<script>
const CARDS = [
  { id: 'hub', filename: 'og-image.png', label: '허브 페이지', cls: 'hub', title: '4동물 유형검사', subtitle: '나는 어떤 동물 유형일까?' },
  { id: 'general', filename: 'og-general.png', label: '일반 유형', cls: 'general', title: '🌟 일반 유형검사', subtitle: '일상에서 나는 어떤 동물일까?' },
  { id: 'work', filename: 'og-work.png', label: '직장 유형', cls: 'work', title: '💼 직장 유형검사', subtitle: '직장에서 나는 어떤 동물일까?' },
  { id: 'love', filename: 'og-love.png', label: '연인 유형', cls: 'love', title: '💕 연인 유형검사', subtitle: '연인 관계에서 나는?' },
  { id: 'family', filename: 'og-family.png', label: '가족 유형', cls: 'family', title: '🏠 가족 유형검사', subtitle: '가족 안에서 나는?' },
  { id: 'friend', filename: 'og-friend.png', label: '친구 유형', cls: 'friend', title: '🤝 친구 유형검사', subtitle: '친구 관계에서 나는?' }
];

function cardHtml(c, scaled) {
  return `<div class="og-card ${c.cls}" data-id="${c.id}" ${scaled ? '' : 'style="transform: scale(1)"'}>
    <div class="og-animals">🦎🦁🐑🦉</div>
    <div class="og-title">${c.title}</div>
    <div class="og-subtitle">${c.subtitle}</div>
    <div class="og-footer">20문항 성격검사<span class="dot">·</span>4animal.kr</div>
  </div>`;
}

const grid = document.getElementById('preview-grid');
CARDS.forEach(c => {
  const item = document.createElement('div');
  item.className = 'preview-item';
  item.innerHTML = `
    <div class="preview-header">
      <span class="preview-name">${c.label} <small style="color:#888;font-weight:500">(${c.filename})</small></span>
      <button class="btn-download-one" onclick="downloadOne('${c.id}')">↓ 다운로드</button>
    </div>
    <div class="preview-canvas-wrap">${cardHtml(c, true)}</div>
  `;
  grid.appendChild(item);
});

const renderArea = document.getElementById('render-area');
CARDS.forEach(c => {
  renderArea.insertAdjacentHTML('beforeend', cardHtml(c, false));
});

async function captureCard(c) {
  const card = renderArea.querySelector(`[data-id="${c.id}"]`);
  if (!card) throw new Error(`Card not found: ${c.id}`);
  const canvas = await html2canvas(card, {
    width: 1200,
    height: 630,
    scale: 1,
    useCORS: true,
    backgroundColor: null,
    logging: false
  });
  return new Promise((resolve) => {
    canvas.toBlob((blob) => resolve(blob), 'image/png');
  });
}

function triggerDownload(blob, filename) {
  const link = document.createElement('a');
  link.download = filename;
  link.href = URL.createObjectURL(blob);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(link.href), 1000);
}

async function downloadOne(id) {
  const c = CARDS.find(x => x.id === id);
  if (!c) return;
  const status = document.getElementById('status');
  status.className = 'status info';
  status.textContent = `🔄 ${c.label} 생성 중...`;
  try {
    const blob = await captureCard(c);
    triggerDownload(blob, c.filename);
    status.className = 'status success';
    status.textContent = `✅ ${c.filename} 다운로드 완료!`;
  } catch(err) {
    console.error(err);
    status.className = 'status error';
    status.textContent = `⚠️ 생성 실패: ${err.message}`;
  }
}

async function downloadAll() {
  const btn = document.getElementById('btn-download-all');
  const status = document.getElementById('status');
  const progress = document.getElementById('progress');
  const fill = document.getElementById('progress-fill');
  const text = document.getElementById('progress-text');
  btn.disabled = true;
  progress.classList.add('show');
  status.className = 'status info';
  status.textContent = '🔄 6장 일괄 생성 중...';
  let done = 0;
  for (const c of CARDS) {
    text.textContent = `${done + 1}/${CARDS.length}: ${c.label} 생성 중...`;
    try {
      const blob = await captureCard(c);
      triggerDownload(blob, c.filename);
      done++;
      fill.style.width = `${(done / CARDS.length) * 100}%`;
      await new Promise(r => setTimeout(r, 300));
    } catch(err) {
      console.error(err);
      status.className = 'status error';
      status.textContent = `⚠️ ${c.label} 생성 실패: ${err.message}`;
      btn.disabled = false;
      return;
    }
  }
  text.textContent = `✅ 완료! ${done}장 모두 다운로드됨`;
  status.className = 'status success';
  status.innerHTML = `✅ <strong>6장 모두 다운로드 완료!</strong><br>이제 다운로드된 6개 PNG 파일을 GitHub 저장소 루트에 업로드하세요.`;
  btn.disabled = false;
}
</script>
</body>
</html>
