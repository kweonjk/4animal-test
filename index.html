<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4동물 유형검사 — 나는 어떤 동물일까?</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --ka: #1B6CA8; --ka-light: #EBF5FB; --ka-mid: #AED6F1;
    --sa: #C00000; --sa-light: #FFF0F0; --sa-mid: #FDDEDE;
    --yang: #2E8B2E; --yang-light: #F0FFF4; --yang-mid: #A9DFBF;
    --bu: #E07B20; --bu-light: #FFF8F0; --bu-mid: #FAD7A0;
    --primary: #1F3864;
    --radius: 14px;
    --shadow: 0 4px 20px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #F4F7FB;
    color: #333;
    min-height: 100vh;
  }
  /* ── 공통 컨테이너 ── */
  .screen { display: none; max-width: 720px; margin: 0 auto; padding: 24px 16px 40px; }
  .screen.active { display: block; }

  /* ── 인트로 ── */
  .intro-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .intro-banner {
    background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%);
    padding: 48px 32px 40px;
    text-align: center;
  }
  .intro-banner .animals { font-size: 2.6rem; margin-bottom: 12px; }
  .intro-banner h1 { color: white; font-size: 1.7rem; font-weight: 700; line-height: 1.4; }
  .intro-banner p  { color: #BED4F0; font-size: 0.95rem; margin-top: 8px; }
  .intro-body { padding: 32px; }
  .intro-body .desc {
    background: #F0F4FB;
    border-left: 4px solid var(--primary);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    font-size: 0.95rem;
    line-height: 1.7;
    color: #555;
    margin-bottom: 24px;
  }
  .name-row {
    display: flex; gap: 12px; align-items: center; margin-bottom: 20px;
  }
  .name-row label { font-weight: 600; white-space: nowrap; color: var(--primary); }
  .name-row input {
    flex: 1; border: 2px solid #D0DCF0; border-radius: 8px;
    padding: 10px 14px; font-size: 1rem; font-family: inherit;
    transition: border-color .2s;
  }
  .name-row input:focus { outline: none; border-color: var(--primary); }
  .animal-pills {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px;
  }
  .pill {
    padding: 6px 14px; border-radius: 20px; font-size: 0.85rem;
    font-weight: 600; color: white;
  }
  .pill.ka   { background: var(--ka); }
  .pill.sa   { background: var(--sa); }
  .pill.yang { background: var(--yang); }
  .pill.bu   { background: var(--bu); }
  .btn-start {
    width: 100%; padding: 16px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), #2E75B6);
    color: white; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    font-family: inherit;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(31,56,100,.3); }

  /* ── 질문 ── */
  .q-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .q-counter { font-size: 0.9rem; color: #888; font-weight: 500; }
  .progress-bar {
    background: #E0E7F0; border-radius: 8px; height: 8px; margin-bottom: 24px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--primary), #2E75B6);
    border-radius: 8px; transition: width .4s ease;
  }
  .q-card {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .q-num-bar {
    background: var(--primary); color: white;
    padding: 12px 24px; font-size: 0.95rem; font-weight: 700;
  }
  .q-text {
    padding: 22px 24px 18px; font-size: 1.05rem; font-weight: 600;
    line-height: 1.5; color: #1F3864;
  }
  .options { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border: 2px solid #E0E7F0; border-radius: 10px;
    background: white; cursor: pointer; font-family: inherit;
    font-size: 0.97rem; color: #333; text-align: left;
    transition: all .18s; width: 100%;
  }
  .option-btn:hover { border-color: var(--primary); background: #F0F4FB; }
  .option-btn.selected { border-color: var(--primary); background: #EBF3FB; }
  .option-label {
    min-width: 30px; height: 30px; border-radius: 50%;
    background: var(--primary); color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
  }
  .option-btn.selected .option-label { background: #1F3864; }
  .q-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px; gap: 12px;
  }
  .btn-prev, .btn-next {
    padding: 12px 28px; border-radius: 8px; border: none;
    font-family: inherit; font-size: 0.97rem; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .btn-prev {
    background: #F0F4FB; color: var(--primary);
    border: 2px solid #D0DCF0;
  }
  .btn-prev:hover { background: #E0E7F0; }
  .btn-next {
    background: var(--primary); color: white; flex: 1; max-width: 220px;
  }
  .btn-next:hover { background: #2E75B6; }
  .btn-next:disabled { background: #B0B8C8; cursor: not-allowed; }
  .btn-submit {
    width: 100%; padding: 15px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #2E8B2E, #1A5C1A);
    color: white; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 20px;
    transition: transform .15s;
  }
  .btn-submit:hover { transform: translateY(-2px); }
  .btn-submit:disabled { background: #B0B8C8; cursor: not-allowed; transform: none; }

  /* ── 결과 ── */
  .result-card {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .result-banner {
    padding: 40px 28px 32px; text-align: center;
  }
  .result-emoji { font-size: 4rem; margin-bottom: 8px; }
  .result-banner h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
  .result-banner .result-sub { font-size: 1rem; opacity: .85; }
  .result-banner .name-tag { font-size: 1.1rem; margin-bottom: 14px; opacity: .9; }
  .result-body { padding: 28px; }
  .score-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 24px;
  }
  .score-item {
    border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .score-item .s-label { font-weight: 600; font-size: 0.95rem; }
  .score-item .s-bar-wrap { flex: 1; margin: 0 10px; }
  .score-bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,.5); overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; background: rgba(255,255,255,.9); }
  .score-item .s-num { font-weight: 700; font-size: 1.1rem; min-width: 28px; text-align: right; }
  .desc-box {
    background: #F8F9FF; border-radius: 10px; padding: 18px 20px;
    margin-bottom: 20px; line-height: 1.75; font-size: 0.97rem; color: #444;
  }
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px;
  }
  .detail-box { border-radius: 10px; padding: 16px; }
  .detail-box h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; }
  .detail-box ul { padding-left: 18px; }
  .detail-box ul li { font-size: 0.88rem; line-height: 1.65; color: #444; margin-bottom: 2px; }
  .tip-box {
    background: #FFFDF0; border: 1.5px solid #F0D060;
    border-radius: 10px; padding: 14px 18px;
    font-size: 0.93rem; color: #664400; line-height: 1.65; margin-bottom: 24px;
  }
  .tip-box strong { color: #AA6600; }
  .btn-retry {
    width: 100%; padding: 14px; border: 2px solid var(--primary);
    border-radius: 10px; background: white; color: var(--primary);
    font-family: inherit; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all .15s;
  }
  .btn-retry:hover { background: #EBF3FB; }
  .share-row {
    display: flex; gap: 10px; margin-bottom: 12px;
  }
  .btn-share-link, .btn-share-email {
    flex: 1; padding: 13px; border-radius: 10px;
    font-family: inherit; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .btn-share-link {
    background: #1F3864; color: white; border: none;
  }
  .btn-share-link:hover { background: #2E75B6; }
  .btn-share-email {
    background: #F0F4FB; color: var(--primary);
    border: 2px solid #D0DCF0;
  }
  .btn-share-email:hover { background: #E0E7F0; }

  /* ── 다른 유형 소통 섹션 ── */
  .other-section { margin-bottom: 24px; }
  .other-section h3 {
    font-size: 1rem; font-weight: 700; color: #1F3864;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 2px solid #E0E7F0;
  }
  .other-cards { display: flex; flex-direction: column; gap: 12px; }
  .other-card {
    border-radius: 12px; border: 1.5px solid #E0E7F0;
    overflow: hidden;
  }
  .other-card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
  }
  .other-card-header .o-emoji { font-size: 1.5rem; }
  .other-card-header .o-name { font-weight: 700; font-size: 0.97rem; }
  .other-card-header .o-brief { font-size: 0.85rem; color: #666; line-height: 1.5; margin-top: 2px; }
  .other-card-body {
    background: white; padding: 12px 16px 14px;
    border-top: 1px solid #F0F0F0;
  }
  .other-card-body .comm-title {
    font-size: 0.82rem; font-weight: 700; color: #888;
    text-transform: uppercase; letter-spacing: .04em;
    margin-bottom: 8px;
  }
  .other-card-body ul { padding-left: 0; list-style: none; }
  .other-card-body ul li {
    font-size: 0.88rem; color: #444; line-height: 1.6;
    padding: 3px 0 3px 18px; position: relative;
  }
  .other-card-body ul li::before {
    content: '✔'; position: absolute; left: 0;
    color: #2E8B2E; font-size: 0.78rem; top: 4px;
  }

  /* ── 이메일 모달 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: white; border-radius: 16px; padding: 32px 28px;
    width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }
  .modal-box h3 { font-size: 1.15rem; font-weight: 700; color: #1F3864; margin-bottom: 6px; }
  .modal-box p { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
  .modal-input {
    width: 100%; border: 2px solid #D0DCF0; border-radius: 10px;
    padding: 12px 16px; font-size: 1rem; font-family: inherit;
    margin-bottom: 14px; transition: border-color .2s;
  }
  .modal-input:focus { outline: none; border-color: #1F3864; }
  .modal-btns { display: flex; gap: 10px; }
  .btn-modal-cancel {
    flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #D0DCF0;
    background: white; color: #888; font-family: inherit;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
  }
  .btn-modal-send {
    flex: 2; padding: 12px; border-radius: 8px; border: none;
    background: #1F3864; color: white; font-family: inherit;
    font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background .15s;
  }
  .btn-modal-send:hover { background: #2E75B6; }
  .btn-modal-send:disabled { background: #B0B8C8; cursor: not-allowed; }
  .modal-status { font-size: 0.9rem; text-align: center; margin-top: 12px; min-height: 20px; }

  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #1F3864; color: white; padding: 12px 28px;
    border-radius: 30px; font-size: 0.95rem; font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }

  /* ── 반응형 ── */
  @media (max-width: 500px) {
    .score-grid, .detail-grid { grid-template-columns: 1fr; }
    .intro-banner { padding: 36px 20px 28px; }
    .intro-banner h1 { font-size: 1.4rem; }
    .q-text { padding: 18px 18px 14px; font-size: 1rem; }
    .options { padding: 0 10px 12px; }
  }
</style>
</head>
<body>

<!-- ══════════ 이메일 모달 ══════════ -->
<div class="modal-overlay" id="email-modal">
  <div class="modal-box">
    <h3>📧 결과를 이메일로 보내기</h3>
    <p>받는 사람의 이메일 주소를 입력해주세요.</p>
    <input class="modal-input" type="email" id="email-input" placeholder="example@gmail.com" />
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeEmailModal()">취소</button>
      <button class="btn-modal-send" id="btn-modal-send" onclick="doSendEmail()">📨 보내기</button>
    </div>
    <div class="modal-status" id="modal-status"></div>
  </div>
</div>

<!-- ══════════ 인트로 ══════════ -->
<div id="screen-intro" class="screen active">
  <div class="intro-card">
    <div class="intro-banner">
      <div class="animals">🦎🦁🐑🦉</div>
      <h1>나는 어떤 동물 유형일까?</h1>
      <p>4동물 유형 성격검사</p>
    </div>
    <div class="intro-body">
      <div class="desc">
        20개의 질문에 솔직하게 답해주세요.<br>
        정답은 없습니다 — 가장 나다운 보기를 고르는 것이 가장 정확합니다.<br>
        소요 시간: 약 <strong>3~5분</strong>
      </div>
      <div class="name-row">
        <label>이름</label>
        <input type="text" id="user-name" placeholder="이름 또는 닉네임을 입력하세요" />
      </div>
      <div class="animal-pills">
        <span class="pill ka">🦎 카멜레온형</span>
        <span class="pill sa">🦁 사자형</span>
        <span class="pill yang">🐑 양형</span>
        <span class="pill bu">🦉 부엉이형</span>
      </div>
      <button class="btn-start" onclick="startTest()">검사 시작하기 →</button>
    </div>
  </div>
</div>

<!-- ══════════ 질문 ══════════ -->
<div id="screen-question" class="screen">
  <div class="q-header">
    <span class="q-counter" id="q-counter">1 / 20</span>
    <span style="font-size:.85rem;color:#888">🦎🦁🐑🦉</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:5%"></div>
  </div>
  <div class="q-card">
    <div class="q-num-bar" id="q-num-bar">Q01</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>
  <div class="q-nav">
    <button class="btn-prev" id="btn-prev" onclick="prevQ()">← 이전</button>
    <button class="btn-next" id="btn-next" onclick="nextQ()">다음 →</button>
  </div>
  <button class="btn-submit" id="btn-submit" onclick="submitTest()" style="display:none">
    🎯 결과 확인하기
  </button>
</div>

<!-- ══════════ 결과 ══════════ -->
<div id="screen-result" class="screen">
  <div class="result-card" id="result-card">
    <div class="result-banner" id="result-banner">
      <div class="name-tag" id="result-name"></div>
      <div class="result-emoji" id="result-emoji"></div>
      <h2 id="result-type"></h2>
      <div class="result-sub" id="result-sub"></div>
    </div>
    <div class="result-body">
      <div class="score-grid" id="score-grid"></div>
      <div class="desc-box" id="result-desc"></div>
      <div class="detail-grid" id="detail-grid"></div>
      <div class="tip-box" id="tip-box"></div>
      <div class="other-section" id="other-section"></div>
      <div class="share-row">
        <button class="btn-share-link" id="btn-share-link" onclick="copyResultLink()">🔗 링크 복사</button>
        <button class="btn-share-email" onclick="sendEmail()">📧 이메일로 보내기</button>
      </div>
      <button class="btn-retry" onclick="retryTest()">↩ 다시 검사하기</button>
    </div>
  </div>
</div>

<script>
// ── 질문 데이터 ────────────────────────────────────
const questions = [
  { q: "새로운 프로젝트가 주어졌을 때 나는?", opts: [
    "목표와 마감부터 정하고 바로 실행한다",
    "계획서를 먼저 꼼꼼히 작성하고 검토한 후 시작한다",
    "팀원들과 충분히 이야기하고 함께 진행한다",
    "일단 시작하고 진행하면서 맞춰간다"
  ]},
  { q: "친구와 갈등이 생겼을 때 나는?", opts: [
    "혼자 충분히 생각한 후 감정이 가라앉으면 이야기한다",
    "내가 조금 양보하더라도 관계를 유지하는 게 먼저다",
    "직접 말로 해결하고 빠르게 결론을 낸다",
    "유머로 분위기를 풀거나 화제를 돌린다"
  ]},
  { q: "모르는 사람들과의 모임에서 나는?", opts: [
    "금방 친해져서 대화를 주도하고 분위기를 만든다",
    "주요 인물을 파악하고 목적에 맞는 사람과 대화한다",
    "먼저 다가오는 사람과 편하게 이야기하며 천천히 섞인다",
    "전체 분위기를 관찰하며 조용히 있다가 필요할 때 말한다"
  ]},
  { q: "중요한 결정을 내릴 때 나는?", opts: [
    "빠르게 판단하고 결정한 후 밀어붙인다",
    "여러 가능성을 열어두고 유연하게 결정한다",
    "관련 자료를 최대한 수집하고 분석한 후 결정한다",
    "주변 사람들 의견을 충분히 듣고 신중하게 결정한다"
  ]},
  { q: "스트레스를 받을 때 나는?", opts: [
    "사람들과 어울리거나 새로운 활동으로 기분 전환한다",
    "운동이나 일에 집중하며 혼자 해결한다",
    "믿을 수 있는 사람에게 털어놓고 공감받는다",
    "혼자만의 시간을 갖고 조용히 정리한다"
  ]},
  { q: "누군가 나에게 부탁할 때 나는?", opts: [
    "가능 여부를 따지고 명확한 기준으로 수락 또는 거절한다",
    "흔쾌히 받아들이고 내 방식으로 창의적으로 해결한다",
    "거절하기 어려워서 일단 받아들이는 편이다",
    "내가 제대로 할 수 있는지 꼼꼼히 따진 후 결정한다"
  ]},
  { q: "회의에서 나는?", opts: [
    "충분히 검토된 의견만 말하고 발언 횟수는 적다",

// ── 상태 ────────────────────────────────────────────
let current = 0;
let answers = new Array(20).fill(null);
let userName = '';
let currentTop = '';
let currentScores = {};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startTest() {
  userName = document.getElementById('user-name').value.trim() || '익명';
  showScreen('screen-question');
  renderQ();
}

function renderQ() {
  const q = questions[current];
  const total = questions.length;

  document.getElementById('q-counter').textContent = `${current+1} / ${total}`;
  document.getElementById('q-num-bar').textContent = `Q${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = `${((current+1)/total)*100}%`;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((txt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-label">${['A','B','C','D'][i]}</span><span>${txt}</span>`;
    btn.onclick = () => selectOpt(i);
    opts.appendChild(btn);
  });

  document.getElementById('btn-prev').style.visibility = current === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').style.display = current < total-1 ? 'block' : 'none';
  document.getElementById('btn-next').disabled = answers[current] === null;
  document.getElementById('btn-submit').style.display = current === total-1 ? 'block' : 'none';
  document.getElementById('btn-submit').disabled = answers[current] === null;
}

function selectOpt(i) {
  answers[current] = i;
  document.querySelectorAll('.option-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx === i);
  });
  document.getElementById('btn-next').disabled = false;
  document.getElementById('btn-submit').disabled = false;
}

function nextQ() {
  if (answers[current] === null) return;
  current++;
  renderQ();
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

function submitTest() {
  if (answers[current] === null) return;
  // 채점
  const scores = { '카':0, '사':0, '양':0, '부':0 };
  answers.forEach((ans, i) => {
    if (ans !== null) scores[SCORE_MAP[i][ans]]++;
  });
  showResult(scores);
}

function encodeResult(name, top, scores) {
  const data = { n: name, t: top, s: scores };
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function decodeResult(encoded) {
  try { return JSON.parse(decodeURIComponent(escape(atob(encoded)))); }
  catch(e) { return null; }
}

function showResult(scores) {
  const top = Object.keys(scores).reduce((a,b) => scores[a] >= scores[b] ? a : b);
  currentTop = top;
  currentScores = scores;
  const r = RESULTS[top];

  // URL에 결과 인코딩
  const encoded = encodeResult(userName, top, scores);
  const newUrl = location.pathname + '?r=' + encoded;
  history.pushState(null, '', newUrl);

  // 배너
  const banner = document.getElementById('result-banner');
  banner.style.background = `linear-gradient(135deg, ${r.color} 0%, ${r.mid} 100%)`;
  banner.style.color = 'white';
  document.getElementById('result-name').textContent = `${userName}님의 결과`;
  document.getElementById('result-emoji').textContent = r.emoji;
  document.getElementById('result-type').textContent = r.name;
  document.getElementById('result-sub').textContent = `「${r.sub}」`;

  // 점수 그리드
  const sg = document.getElementById('score-grid');
  sg.innerHTML = '';
  const order = ['카','사','양','부'];
  const maxScore = Math.max(...Object.values(scores));
  order.forEach(ak => {
    const rv = RESULTS[ak];
    const pct = maxScore > 0 ? (scores[ak]/maxScore)*100 : 0;
    const isTop = (ak === top);
    sg.innerHTML += `
      <div class="score-item" style="background:${rv.light};border:2px solid ${isTop ? rv.color : '#eee'}">
        <span class="s-label" style="color:${rv.color}">${rv.emoji} ${rv.name}</span>
        <div class="s-bar-wrap">
          <div class="score-bar" style="background:#E0E0E0">
            <div class="score-bar-fill" style="width:${pct}%;background:${rv.color}"></div>
          </div>
        </div>
        <span class="s-num" style="color:${rv.color}">${scores[ak]}점</span>
      </div>`;
  });

  // 설명
  document.getElementById('result-desc').textContent = r.desc;

  // 장단점
  const dg = document.getElementById('detail-grid');
  dg.innerHTML = `
    <div class="detail-box" style="background:${r.light};border:1.5px solid ${r.mid}">
      <h4 style="color:${r.color}">✅ 주요 강점</h4>
      <ul>${r.pros.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="detail-box" style="background:#FFF8F8;border:1.5px solid #FFD0D0">
      <h4 style="color:#C00000">⚠️ 성장 포인트</h4>
      <ul>${r.cons.map(c=>`<li>${c}</li>`).join('')}</ul>
    </div>`;

  // 팁
  document.getElementById('tip-box').innerHTML = r.tip;

  // 다른 유형 소통 카드
  const others = ['카','사','양','부'].filter(k => k !== top);
  const os = document.getElementById('other-section');
  os.innerHTML = `<h3>🤝 다른 유형과 소통하는 법</h3><div class="other-cards">` +
    others.map(k => {
      const ov = RESULTS[k];
      return `
        <div class="other-card">
          <div class="other-card-header" style="background:${ov.light}">
            <span class="o-emoji">${ov.emoji}</span>
            <div>
              <div class="o-name" style="color:${ov.color}">${ov.name}</div>
              <div class="o-brief">${ov.brief}</div>
            </div>
          </div>
          <div class="other-card-body">
            <div class="comm-title">💬 이렇게 소통하세요</div>
            <ul>${ov.comm.map(c => `<li>${c}</li>`).join('')}</ul>
          </div>
        </div>`;
    }).join('') + `</div>`;

  showScreen('screen-result');
}

function retryTest() {
  current = 0;
  answers = new Array(20).fill(null);
  currentTop = '';
  currentScores = {};
  history.pushState(null, '', location.pathname);
  showScreen('screen-intro');
}

function copyResultLink() {
  const url = location.href;
  navigator.clipboard.writeText(url).then(() => {
    showToast('✅ 링크가 복사됐어요!');
    const btn = document.getElementById('btn-share-link');
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => { btn.textContent = '🔗 링크 복사'; }, 2500);
  }).catch(() => {
    // fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ 링크가 복사됐어요!');
    const btn = document.getElementById('btn-share-link');
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => { btn.textContent = '🔗 링크 복사'; }, 2500);
  });
}

// ── EmailJS 설정 ────────────────────────────────────
const EJS_PUBLIC_KEY  = 'hKIxH-TLR18w4HQun';
const EJS_SERVICE_ID  = 'service_0moj8bs';
const EJS_TEMPLATE_ID = 'template_9buriby';
emailjs.init(EJS_PUBLIC_KEY);

function sendEmail() {
  document.getElementById('email-input').value = '';
  document.getElementById('modal-status').textContent = '';
  document.getElementById('btn-modal-send').disabled = false;
  document.getElementById('btn-modal-send').textContent = '📨 보내기';
  document.getElementById('email-modal').classList.add('open');
  setTimeout(() => document.getElementById('email-input').focus(), 100);
}

function closeEmailModal() {
  document.getElementById('email-modal').classList.remove('open');
}

function doSendEmail() {
  const toEmail = document.getElementById('email-input').value.trim();
  if (!toEmail || !toEmail.includes('@')) {
    document.getElementById('modal-status').innerHTML = '<span style="color:#C00000">올바른 이메일 주소를 입력해주세요.</span>';
    return;
  }

  const r = RESULTS[currentTop];
  const scoreLines = ['카','사','양','부'].map(k =>
    `${RESULTS[k].emoji} ${RESULTS[k].name}: ${currentScores[k]}점`
  ).join('\n');

  const btn = document.getElementById('btn-modal-send');
  btn.disabled = true;
  btn.textContent = '전송 중...';
  document.getElementById('modal-status').textContent = '';

  emailjs.send(EJS_SERVICE_ID, EJS_TEMPLATE_ID, {
    to_email:    toEmail,
    user_name:   userName,
    animal_type: r.name,
    animal_emoji: r.emoji,
    animal_sub:  r.sub,
    scores:      scoreLines,
    result_link: location.href,
  }).then(() => {
    document.getElementById('modal-status').innerHTML = '✅ <span style="color:#2E8B2E">이메일이 성공적으로 전송됐어요!</span>';
    btn.textContent = '✅ 전송 완료';
    setTimeout(() => closeEmailModal(), 2000);
  }).catch((err) => {
    document.getElementById('modal-status').innerHTML = '<span style="color:#C00000">전송 실패. 잠시 후 다시 시도해주세요.</span>';
    btn.disabled = false;
    btn.textContent = '📨 보내기';
    console.error('EmailJS error:', err);
  });
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast'; toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── URL에서 결과 복원 ────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const encoded = params.get('r');
  if (encoded) {
    const data = decodeResult(encoded);
    if (data && data.n && data.t && data.s) {
      userName = data.n;
      currentTop = data.t;
      currentScores = data.s;
      showResult(data.s);
    }
  }
});
